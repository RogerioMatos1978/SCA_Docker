{% extends "base.html" %}
{% block titulo %}Configurações{% endblock %}
{% block conteudo %}
<h1>Configurações</h1>

<form method="POST" class="formulario">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="nome_instituicao">Nome da instituição</label>
    <input type="text" id="nome_instituicao" name="nome_instituicao" value="{{ configs.get('nome_instituicao', '') }}">

    <label for="destino_chamada">Texto de destino exibido/narrado na chamada</label>
    <input type="text" id="destino_chamada" name="destino_chamada" value="{{ configs.get('destino_chamada', 'Portaria de Saída') }}">
    <p class="texto-ajuda">Esse texto aparece e é narrado em toda TV, independente de qual sala chamou.</p>

    <label class="checkbox-linha">
        <input type="checkbox" name="kiosk_modo_simplificado" {{ 'checked' if configs.get('kiosk_modo_simplificado') == '1' }}>
        Kiosk em modo simplificado (esconde tudo, exceto o botão discreto de login — recomendado para terminal fixo)
    </label>

    <button type="submit" class="botao botao-primario">Salvar</button>
</form>
{% endblock %}
