{% extends "base.html" %}
{% block titulo %}Usuários{% endblock %}
{% block conteudo %}
<h1>Usuários</h1>

<table class="tabela">
    <thead>
        <tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Ativo</th><th>Ações</th></tr>
    </thead>
    <tbody>
        {% for u in usuarios %}
        <tr>
            <td>{{ u['nome'] }}</td>
            <td>{{ u['email'] }}</td>
            <td>{{ u['perfil'] }}</td>
            <td>{{ 'Sim' if u['ativo'] else 'Não' }}</td>
            <td>
                <form method="POST" action="{{ url_for('admin.usuarios_alternar_ativo', usuario_id=u['id']) }}" class="form-inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="botao-link">{{ 'Desativar' if u['ativo'] else 'Ativar' }}</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<h2>Novo usuário</h2>
<form method="POST" class="formulario">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="nome">Nome</label>
    <input type="text" id="nome" name="nome" required>

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required>

    <label for="senha">Senha (mínimo 6 caracteres)</label>
    <input type="password" id="senha" name="senha" required minlength="6">

    <label for="perfil">Perfil</label>
    <select id="perfil" name="perfil">
        <option value="operador">Operador</option>
        <option value="supervisor">Supervisor</option>
        <option value="administrador">Administrador</option>
    </select>

    <button type="submit" class="botao botao-primario">Criar usuário</button>
</form>
{% endblock %}
